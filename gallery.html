<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nomi Archive</title>
<meta name="theme-color" content="#f7f5f2" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#161614" media="(prefers-color-scheme: dark)">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f2;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6860;
    --text3: #a8a49e;
    --accent: #2a2a28;
    --accent-fg: #ffffff;
    --success: #1a7a4a;
    --fav: #e05555;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161614;
      --surface: #1f1f1c;
      --surface2: #2a2a26;
      --border: rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.16);
      --text: #f0ede8;
      --text2: #9c9890;
      --text3: #5c5a54;
      --accent: #e8e4de;
      --accent-fg: #1a1a18;
    }
  }

  html { font-size: 16px; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 2rem; padding-bottom: 1.25rem;
    border-bottom: 0.5px solid var(--border);
    flex-wrap: wrap; gap: 1rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px; font-weight: 400;
    letter-spacing: -0.5px; line-height: 1;
  }

  header h1 span {
    display: block; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400;
    color: var(--text3); margin-top: 4px;
  }

  /* ── Loading state ── */
  .loading-state {
    text-align: center; padding: 4rem 1rem;
    color: var(--text3); font-size: 14px; display: none;
  }

  .loading-state.visible { display: block; }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--text2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 10px;
    margin-bottom: 1rem; flex-wrap: wrap; align-items: center;
  }

  .search-wrap { position: relative; flex: 1; min-width: 200px; }

  .search-wrap svg {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--text3); pointer-events: none;
  }

  .search-wrap input {
    width: 100%; padding: 9px 12px 9px 34px; font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text); outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus { border-color: var(--text3); }
  .search-wrap input::placeholder { color: var(--text3); }

  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }

  .tab {
    padding: 7px 16px; font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    border: 0.5px solid var(--border2); border-radius: 999px;
    background: var(--surface); color: var(--text2);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }

  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

  /* ── Style filter ── */
  .style-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }

  .style-tab {
    padding: 5px 14px; font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    border: 0.5px solid var(--border2); border-radius: 999px;
    background: var(--surface); color: var(--text2);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }

  .style-tab:hover { background: var(--surface2); color: var(--text); }
  .style-tab.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px;
  }

  .stats-bar { font-size: 12px; color: var(--text3); }
  .toolbar-actions { display: flex; gap: 8px; align-items: center; }

  .toolbar-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 12px; font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text2);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }

  .toolbar-btn:hover { background: var(--surface2); color: var(--text); }
  .toolbar-btn svg { width: 13px; height: 13px; }
  .toolbar-btn.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }

  /* Sort dropdown */
  .sort-select {
    padding: 6px 10px; font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text2);
    cursor: pointer; outline: none; transition: all 0.15s;
  }

  .sort-select:hover { background: var(--surface2); color: var(--text); }
  .sort-select option { background: var(--surface); }

  /* ── Gallery grid ── */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  @media (max-width: 600px) {
    .gallery { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    body { padding: 1rem 1rem 3rem; }
    header h1 { font-size: 24px; }
    .tab { padding: 6px 12px; font-size: 12px; }
  }

  @media (max-width: 380px) { .gallery { grid-template-columns: 1fr; } }

  /* ── Card ── */
  .card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, opacity 0.3s;
    animation: cardIn 0.3s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  .card:hover { border-color: var(--border2); transform: translateY(-2px); }

  .img-area {
    width: 100%; aspect-ratio: 1 / 1;
    background: var(--surface2); overflow: hidden;
    position: relative; display: flex;
    align-items: center; justify-content: center;
    cursor: zoom-in;
  }

  .img-area img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: transform 0.3s ease;
  }

  .card:hover .img-area img { transform: scale(1.03); }

  .img-placeholder {
    display: flex; flex-direction: column;
    align-items: center; gap: 10px;
    color: var(--text3); font-size: 12px; text-align: center; padding: 1rem;
    cursor: default;
  }

  .img-placeholder svg { width: 36px; height: 36px; }

  .nomi-badge {
    position: absolute; top: 9px; left: 9px;
    background: rgba(0,0,0,0.52); color: #fff;
    font-size: 11px; font-weight: 500; padding: 3px 10px;
    border-radius: 999px; backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px); letter-spacing: 0.02em;
  }

  /* Favourite button on card */
  .fav-btn-card {
    position: absolute; top: 8px; right: 8px; z-index: 3;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,0.45); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    opacity: 0;
  }

  .card:hover .fav-btn-card,
  .fav-btn-card.active { opacity: 1; }
  .fav-btn-card.active { background: rgba(224,85,85,0.85); }
  .fav-btn-card svg { width: 14px; height: 14px; stroke: #fff; fill: none; }
  .fav-btn-card.active svg { fill: #fff; }

  /* Style badge */
  .style-badge {
    position: absolute; bottom: 9px; right: 9px;
    background: rgba(0,0,0,0.52); color: #fff;
    font-size: 10px; font-weight: 500; padding: 2px 8px;
    border-radius: 999px; backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px); letter-spacing: 0.04em;
    pointer-events: none; z-index: 1;
  }

  /* NSFW */
  .nsfw-cover {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; cursor: pointer; z-index: 2;
    background: rgba(0,0,0,0.15);
  }

  .nsfw-cover.hidden { display: none; }
  .nsfw-blur { filter: blur(18px); transform: scale(1.08); }
  .card:hover .img-area .nsfw-blur { transform: scale(1.08); }

  .nsfw-label {
    background: rgba(0,0,0,0.68); color: #fff;
    font-size: 11px; font-weight: 500; padding: 4px 12px;
    border-radius: 999px; letter-spacing: 0.06em; text-transform: uppercase;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); pointer-events: none;
  }

  .nsfw-hint { font-size: 11px; color: rgba(255,255,255,0.65); pointer-events: none; }

  .nsfw-badge {
    position: absolute; top: 9px; right: 9px;
    background: rgba(180,40,40,0.82); color: #fff;
    font-size: 10px; font-weight: 500; padding: 2px 8px;
    border-radius: 999px; letter-spacing: 0.06em;
    text-transform: uppercase; z-index: 3; pointer-events: none;
  }

  /* ── Prompt overlay on card ── */
  .prompt-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
    padding: 28px 12px 12px;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.22s ease, transform 0.22s ease;
    pointer-events: none;
  }

  .card:hover .prompt-overlay { opacity: 1; transform: translateY(0); }

  .prompt-overlay-text {
    font-size: 12px; color: rgba(255,255,255,0.92); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }

  .prompt-overlay-actions {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px; pointer-events: all;
  }

  .filename {
    font-size: 10px; color: rgba(255,255,255,0.45); font-style: italic;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px;
  }

  .copy-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px; font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    border: 0.5px solid rgba(255,255,255,0.3); border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85);
    cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }

  .copy-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }
  .copy-btn.copied { color: #6ee7a8; border-color: rgba(110,231,168,0.5); }
  .copy-btn svg { width: 11px; height: 11px; flex-shrink: 0; }

  /* ── Sentinel (infinite scroll trigger) ── */
  .scroll-sentinel {
    height: 1px; grid-column: 1 / -1;
  }

  .load-more-spinner {
    grid-column: 1 / -1; text-align: center;
    padding: 1.5rem; display: none;
  }

  .load-more-spinner.visible { display: block; }

  .load-more-spinner .spinner { margin: 0 auto; }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1 / -1; text-align: center;
    padding: 4rem 1rem; color: var(--text3);
  }

  .empty-state p { font-size: 14px; margin-bottom: 8px; }

  /* ── Related images ── */
  .related-title {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.09em; color: var(--text3); margin-bottom: 0.75rem;
  }

  .related-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }

  /* Inside lightbox — horizontal scroll row */
  .lightbox-related {
    display: none;
    max-width: min(880px, 90vw);
    margin-top: 1rem; padding-top: 1rem;
    border-top: 0.5px solid rgba(255,255,255,0.12);
    cursor: default;
  }

  .lightbox-related.visible { display: block; }

  .lightbox-related .related-title { color: rgba(255,255,255,0.35); }

  .lightbox-related .related-grid {
    display: flex; gap: 8px; overflow-x: auto;
    grid-template-columns: none;
    padding-bottom: 4px;
  }

  .lightbox-related .related-card {
    flex: 0 0 100px; width: 100px; height: 100px;
  }

  .lightbox-related .related-card img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /* Inside bottom sheet */
  .sheet-related {
    padding-top: 12px;
    border-top: 0.5px solid var(--border);
  }

  .sheet-related .related-grid {
    display: flex; gap: 8px; overflow-x: auto;
    grid-template-columns: none;
    padding-bottom: 4px;
  }

  .sheet-related .related-card {
    flex: 0 0 90px; width: 90px; height: 90px;
  }

  .sheet-related .related-card img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .related-card {
    border-radius: var(--radius-sm); overflow: hidden;
    cursor: zoom-in; position: relative;
    border: 0.5px solid var(--border);
    transition: border-color 0.15s, transform 0.15s;
    animation: cardIn 0.3s ease both;
  }

  .related-card:hover { border-color: var(--border2); transform: translateY(-2px); }

  .related-card img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block;
  }

  .related-card .nomi-badge { font-size: 10px; padding: 2px 7px; }

  /* ── Lightbox ── */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    flex-direction: column; align-items: center; justify-content: center;
    padding: 1.5rem; cursor: zoom-out;
  }

  .lightbox.open { display: flex; }

  .lightbox-img-wrap {
    max-width: min(880px, 90vw); max-height: 76vh;
    display: flex; align-items: center; justify-content: center;
    animation: lbIn 0.22s cubic-bezier(0.22,1,0.36,1);
    cursor: default; touch-action: none; user-select: none;
    overflow: hidden; position: relative;
  }

  @keyframes lbIn { from { opacity:0; transform:scale(0.94); } to { opacity:1; transform:scale(1); } }

  .lightbox-img-wrap img {
    max-width: 100%; max-height: 76vh; object-fit: contain;
    border-radius: var(--radius); display: block;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    transition: transform 0.1s ease;
    transform-origin: center center;
  }

  .lightbox-close {
    position: fixed; top: 1.25rem; right: 1.25rem;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; z-index: 1001; line-height: 1;
  }

  .lightbox-close:hover { background: rgba(255,255,255,0.2); }

  .lightbox-counter {
    position: fixed; top: 1.4rem; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: rgba(255,255,255,0.4); white-space: nowrap; z-index: 1001;
  }

  .lightbox-nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.18);
    color: #fff; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; z-index: 1001; line-height: 1;
  }

  .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
  .lightbox-nav:disabled { opacity: 0.2; cursor: default; pointer-events: none; }
  .lightbox-nav.prev { left: 1rem; }
  .lightbox-nav.next { right: 1rem; }

  .lightbox-meta {
    margin-top: 1.25rem; max-width: min(880px, 90vw);
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    cursor: default;
  }

  .lightbox-info { flex: 1; min-width: 0; }

  .lightbox-nomi {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.09em; color: rgba(255,255,255,0.4); margin-bottom: 5px;
  }

  .lightbox-prompt { font-size: 14px; color: rgba(255,255,255,0.82); line-height: 1.6; }
  .lightbox-filename { font-size: 11px; color: rgba(255,255,255,0.28); margin-top: 5px; font-style: italic; }

  .lightbox-actions { display: flex; gap: 8px; flex-shrink: 0; align-self: flex-start; flex-wrap: wrap; }

  .lightbox-btn {
    padding: 7px 16px; font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.2);
    border-radius: var(--radius-sm); color: rgba(255,255,255,0.8);
    cursor: pointer; white-space: nowrap; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }

  .lightbox-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .lightbox-btn.copied { color: #6ee7a8; border-color: rgba(110,231,168,0.4); }
  .lightbox-btn.slideshow-active { color: #fbbf24; border-color: rgba(251,191,36,0.4); background: rgba(251,191,36,0.08); }
  .lightbox-btn.fav-active { color: #f87171; border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.08); }
  .lightbox-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* Zoom hint */
  .zoom-hint {
    position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: rgba(255,255,255,0.3); pointer-events: none;
    z-index: 1001; white-space: nowrap; opacity: 1;
    transition: opacity 0.5s;
  }

  .zoom-hint.hidden { opacity: 0; }

  /* ── Slideshow ── */
  .slideshow-bar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.1); z-index: 1002; display: none;
  }

  .slideshow-bar.visible { display: block; }

  .slideshow-progress {
    height: 100%; background: rgba(255,255,255,0.6);
    width: 0%; transition: width linear;
  }

  /* ── Mobile bottom sheet ── */
  .bottom-sheet-backdrop {
    display: none; position: fixed; inset: 0; z-index: 1010;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .bottom-sheet-backdrop.open { display: block; }

  .bottom-sheet {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1011;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh;
    display: flex; flex-direction: column;
  }

  .bottom-sheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border2); margin: 12px auto 0; flex-shrink: 0;
  }

  .sheet-img-wrap {
    width: 100%; aspect-ratio: 1/1;
    overflow: hidden; flex-shrink: 0; background: #000;
  }

  .sheet-img-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }

  .sheet-nav-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 0; flex-shrink: 0;
  }

  .sheet-counter { font-size: 12px; color: var(--text3); }
  .sheet-nav-btns { display: flex; gap: 8px; }

  .sheet-nav-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface2); border: 0.5px solid var(--border2);
    color: var(--text2); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; line-height: 1;
  }

  .sheet-nav-btn:disabled { opacity: 0.25; pointer-events: none; }

  .sheet-body {
    padding: 14px 20px 20px; overflow-y: auto; flex: 1;
    display: flex; flex-direction: column; gap: 12px;
  }

  .sheet-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .sheet-nomi {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.09em; color: var(--text3);
  }

  .sheet-style-badge {
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 2px 8px; border-radius: 999px;
    border: 0.5px solid var(--border2); color: var(--text2); background: var(--surface2);
  }

  .sheet-nsfw-badge {
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 2px 8px; border-radius: 999px;
    border: 0.5px solid rgba(220,80,80,0.4);
    color: rgba(220,80,80,0.85); background: rgba(220,80,80,0.08);
  }

  .sheet-prompt { font-size: 14px; color: var(--text); line-height: 1.65; }
  .sheet-filename { font-size: 11px; color: var(--text3); font-style: italic; }

  .sheet-actions { display: flex; gap: 8px; }

  .sheet-copy-btn {
    flex: 1; padding: 13px; font-size: 14px; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    background: var(--accent); color: var(--accent-fg);
    border: none; border-radius: var(--radius-sm);
    cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
  }

  .sheet-copy-btn:active { opacity: 0.8; }
  .sheet-copy-btn.copied { opacity: 0.7; }

  .sheet-fav-btn {
    width: 50px; padding: 13px; font-size: 18px;
    background: var(--surface2); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }

  .sheet-fav-btn.active { background: rgba(224,85,85,0.12); border-color: rgba(224,85,85,0.4); }
  .sheet-fav-btn svg { width: 18px; height: 18px; stroke: var(--text2); fill: none; }
  .sheet-fav-btn.active svg { stroke: var(--fav); fill: var(--fav); }

  /* Hide bottom sheet on desktop */
  @media (min-width: 601px) {
    .bottom-sheet-backdrop, .bottom-sheet { display: none !important; }
  }

  /* On mobile: lightbox image only, no meta */
  @media (max-width: 600px) {
    .lightbox-meta { display: none; }
    .lightbox { padding: 0; justify-content: center; }
    .lightbox-img-wrap { max-width: 100vw; max-height: 100vh; }
    .lightbox-img-wrap img { border-radius: 0; max-height: 100vh; }
    .lightbox-nav.prev { left: 0.5rem; }
    .lightbox-nav.next { right: 0.5rem; }
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: var(--accent-fg);
    font-size: 13px; padding: 10px 20px; border-radius: 999px;
    opacity: 0; transition: all 0.3s ease;
    pointer-events: none; white-space: nowrap; z-index: 9999;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Gallery fade transition ── */
  .gallery.fading { opacity: 0; transition: opacity 0.15s; }
  .gallery.visible { opacity: 1; transition: opacity 0.2s; }
</style>
</head>
<body>

<header>
  <h1>Nomi Archive <span id="headerSub">Loading…</span></h1>
  <div style="font-size:12px; color:var(--text3); align-self:center;" id="headerRight"></div>
</header>

<div class="loading-state visible" id="loadingState">
  <div class="spinner"></div>
  Loading your archive…
</div>

<div id="mainContent" style="display:none;">
  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search prompts…" oninput="onSearch()">
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="style-filter" id="styleFilter" style="display:none;"></div>

  <div class="toolbar">
    <div class="stats-bar" id="statsBar"></div>
    <div class="toolbar-actions">
      <select class="sort-select" id="sortSelect" onchange="onSortChange()">
        <option value="newest">Last added</option>
        <option value="oldest">First added</option>
      </select>
      <button class="toolbar-btn" id="favFilterBtn" onclick="toggleFavFilter()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 13.5S1.5 9.5 1.5 5.5a3 3 0 0 1 6-1 3 3 0 0 1 6 1c0 4-6.5 8-6.5 8z"/>
        </svg>
        Favourites
      </button>
      <button class="toolbar-btn" onclick="startSlideshow()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <polygon points="5,3 13,8 5,13"/>
        </svg>
        Slideshow
      </button>
    </div>
  </div>

  <div class="gallery" id="gallery"></div>
  <div class="load-more-spinner" id="loadMoreSpinner"><div class="spinner"></div></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="onLightboxBgClick(event)">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <div class="lightbox-counter" id="lbCounter"></div>
  <button class="lightbox-nav prev" id="lbPrev" onclick="lbNav(-1, event)">&#8249;</button>
  <button class="lightbox-nav next" id="lbNext" onclick="lbNav(1, event)">&#8250;</button>
  <div class="lightbox-img-wrap" id="lbImgWrap" onclick="event.stopPropagation()">
    <img id="lbImg" src="" alt="">
  </div>
  <div class="lightbox-meta" onclick="event.stopPropagation()">
    <div class="lightbox-info">
      <div class="lightbox-nomi" id="lbNomi"></div>
      <div class="lightbox-prompt" id="lbPrompt"></div>
      <div class="lightbox-filename" id="lbFilename"></div>
    </div>
    <div class="lightbox-actions">
      <button class="lightbox-btn" id="lbCopyBtn" onclick="lbCopy()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1"/></svg>
        Copy prompt
      </button>
      <button class="lightbox-btn" id="lbFavBtn" onclick="lbToggleFav()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13.5S1.5 9.5 1.5 5.5a3 3 0 0 1 6-1 3 3 0 0 1 6 1c0 4-6.5 8-6.5 8z"/></svg>
        Favourite
      </button>
      <button class="lightbox-btn" id="lbSlideshowBtn" onclick="toggleSlideshow()">Slideshow</button>
    </div>
  </div>
  <div class="lightbox-related" id="relatedStrip" onclick="event.stopPropagation()">
    <div class="related-title" id="relatedTitle">Related images</div>
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</div>
<div class="zoom-hint" id="zoomHint">Scroll to zoom · Double-click to reset</div>

<div class="slideshow-bar" id="slideshowBar">
  <div class="slideshow-progress" id="slideshowProgress"></div>
</div>

<!-- Mobile bottom sheet -->
<div class="bottom-sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-img-wrap">
    <img id="sheetImg" src="" alt="">
  </div>
  <div class="sheet-nav-row">
    <span class="sheet-counter" id="sheetCounter"></span>
    <div class="sheet-nav-btns">
      <button class="sheet-nav-btn" id="sheetPrev" onclick="sheetNav(-1)">&#8249;</button>
      <button class="sheet-nav-btn" id="sheetNext" onclick="sheetNav(1)">&#8250;</button>
    </div>
  </div>
  <div class="sheet-body">
    <div class="sheet-meta-row">
      <span class="sheet-nomi" id="sheetNomi"></span>
      <span class="sheet-style-badge" id="sheetStyle" style="display:none;"></span>
      <span class="sheet-nsfw-badge" id="sheetNsfw" style="display:none;">NSFW</span>
    </div>
    <div class="sheet-prompt" id="sheetPrompt"></div>
    <div class="sheet-filename" id="sheetFilename"></div>
    <div class="sheet-actions">
      <button class="sheet-copy-btn" id="sheetCopyBtn" onclick="sheetCopy()">Copy prompt</button>
      <button class="sheet-fav-btn" id="sheetFavBtn" onclick="sheetToggleFav()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 13.5S1.5 9.5 1.5 5.5a3 3 0 0 1 6-1 3 3 0 0 1 6 1c0 4-6.5 8-6.5 8z"/></svg>
      </button>
    </div>
    <div class="sheet-related" id="sheetRelated" style="display:none;">
      <div class="related-title" id="sheetRelatedTitle"></div>
      <div class="related-grid" id="sheetRelatedGrid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── CONFIGURATION ─────────────────────────────────────
  // Set dataSource to 'local' for GitHub Pages / local server (toolkit default)
  // Set dataSource to 'remote' and fill in remoteUrl for R2, CDN, or any web server
  const CONFIG = {
    dataSource: 'remote',
    remoteUrl:  'https://pub-20c4e1e9ea4b4b82bd232b80e1b61bff.r2.dev',
    workerUrl:  'https://nomi-archive-worker.jovialk69.workers.dev',
  };

  function csvUrl()           { return CONFIG.dataSource === 'remote' ? `${CONFIG.remoteUrl}/prompts.csv`       : 'prompts.csv'; }
  function imageUrl(filename) { return CONFIG.dataSource === 'remote' ? `${CONFIG.remoteUrl}/images/${filename}` : `images/${filename}`; }
  // ──────────────────────────────────────────────────────

  const PAGE_SIZE = 15;

  let allEntries    = [];
  let activeNomi    = 'All';
  let activeStyle   = 'All';
  let activeSort    = 'newest';
  let showFavsOnly  = false;
  let hasStyles     = false;
  let favourites    = {};   // filename → true (localStorage fallback or from CSV)
  let lbIndex       = 0;
  let lbFiltered    = [];
  let renderedCount = 0;
  let slideshowTimer  = null;
  let slideshowActive = false;
  const SLIDESHOW_INTERVAL = 5000;

  // ── Init ──────────────────────────────────────────────
  async function init() {
    const params     = new URLSearchParams(window.location.search);
    const savedNomi  = params.get('nomi')  || localStorage.getItem('nomi_gallery_nomi')  || 'All';
    const savedSearch= params.get('q')     || localStorage.getItem('nomi_gallery_search')|| '';
    const savedStyle = params.get('style') || localStorage.getItem('nomi_gallery_style') || 'All';
    const savedSort  = localStorage.getItem('nomi_gallery_sort') || 'newest';

    // Load local favourites fallback
    try { favourites = JSON.parse(localStorage.getItem('nomi_gallery_favs') || '{}'); } catch(e) { favourites = {}; }

    try {
      const res = await fetch(csvUrl());
      if (!res.ok) throw new Error('CSV not found');
      const text = await res.text();
      allEntries = parseCSV(text);
      if (!allEntries.length) throw new Error('No entries in CSV');

      // Merge favourites from CSV (remote mode)
      if (CONFIG.dataSource === 'remote') {
        allEntries.forEach(e => { if (e.favourite) favourites[e.filename] = true; });
      }

      activeNomi  = allEntries.find(e => e.nomi === savedNomi) ? savedNomi : 'All';
      activeStyle = savedStyle;
      activeSort  = savedSort;
      document.getElementById('searchInput').value = savedSearch;
      document.getElementById('sortSelect').value  = savedSort;

      document.getElementById('loadingState').classList.remove('visible');
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('headerSub').textContent = 'Your image & prompt collection';

      buildTabs();
      buildStyleFilter();
      render();
      initInfiniteScroll();

    } catch(err) {
      document.getElementById('loadingState').innerHTML =
        `<p style="color:var(--text2); font-size:14px;">Could not load <code style="font-family:monospace;font-size:12px;background:var(--surface2);padding:2px 6px;border-radius:4px;">prompts.csv</code></p>
         <p style="font-size:13px; color:var(--text3); margin-top:8px;">Make sure this file is in the same folder as gallery.html and the site is served over HTTP.</p>`;
    }
  }

  // ── CSV parser ────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const entries = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const first = line.indexOf(','), second = line.indexOf(',', first + 1);
      if (first === -1 || second === -1) continue;
      const filename = line.slice(0, first).trim();
      const nomi     = line.slice(first + 1, second).trim();
      let rest = line.slice(second + 1).trim();
      let prompt = rest, nsfw = false, style = '', favourite = false;

      if (rest.startsWith('"')) {
        const cq = rest.indexOf('"', 1);
        if (cq !== -1) {
          prompt = rest.slice(1, cq);
          const after = rest.slice(cq + 1).trim();
          if (after.startsWith(',')) {
            const fields = after.slice(1).split(',');
            nsfw      = fields[0]?.trim().toLowerCase() === 'true';
            style     = fields[1]?.trim() || '';
            favourite = fields[2]?.trim().toLowerCase() === 'true';
          }
        }
      } else {
        const parts = rest.split(',');
        const last  = parts[parts.length - 1].trim().toLowerCase();
        const prev  = parts[parts.length - 2]?.trim().toLowerCase() || '';
        const prev2 = parts[parts.length - 3]?.trim().toLowerCase() || '';
        if (last === 'true' || last === 'false') {
          // Could be favourite column
          favourite = last === 'true';
          const styleCand = parts[parts.length - 2]?.trim().toLowerCase();
          if (styleCand === 'realistic' || styleCand === 'anime' || styleCand === 'mix' || styleCand === '') {
            style = parts[parts.length - 2]?.trim() || '';
            nsfw  = prev2 === 'true';
            prompt = parts.slice(0, parts.length - 3).join(',').trim();
          } else if (prev === 'true' || prev === 'false') {
            nsfw  = prev === 'true';
            prompt = parts.slice(0, parts.length - 2).join(',').trim();
          } else {
            prompt = parts.slice(0, parts.length - 1).join(',').trim();
          }
        } else if (last === 'realistic' || last === 'anime' || last === 'mix' || last === '') {
          style = parts[parts.length - 1].trim();
          nsfw  = prev === 'true';
          prompt = parts.slice(0, parts.length - 2).join(',').trim();
        } else if (prev === 'true' || prev === 'false') {
          nsfw  = prev === 'true';
          prompt = parts.slice(0, parts.length - 1).join(',').trim();
        }
      }
      entries.push({ filename, nomi, prompt, nsfw, style, favourite });
    }
    hasStyles = entries.some(e => e.style);
    return entries;
  }

  // ── Tabs ──────────────────────────────────────────────
  function buildTabs() {
    const nomis = ['All', ...new Set(allEntries.map(e => e.nomi))];
    document.getElementById('tabs').innerHTML = nomis.map(n =>
      `<button class="tab ${n === activeNomi ? 'active' : ''}" onclick="setNomi('${n.replace(/'/g,"\\'")}')">
        ${n}${n !== 'All' ? ` <span style="font-size:11px;opacity:0.55;">${allEntries.filter(e=>e.nomi===n).length}</span>` : ''}
      </button>`
    ).join('');
  }

  function setNomi(n) { activeNomi = n; buildTabs(); renderWithTransition(); saveState(); }
  function onSearch() { renderWithTransition(); saveState(); }
  function onSortChange() { activeSort = document.getElementById('sortSelect').value; renderWithTransition(); saveState(); }
  function toggleFavFilter() {
    showFavsOnly = !showFavsOnly;
    document.getElementById('favFilterBtn').classList.toggle('active', showFavsOnly);
    renderWithTransition();
  }

  function buildStyleFilter() {
    const el = document.getElementById('styleFilter');
    if (!hasStyles) { el.style.display = 'none'; return; }
    const styles = ['All', ...new Set(allEntries.map(e => e.style).filter(Boolean))];
    el.style.display = 'flex';
    el.innerHTML = `<span style="font-size:12px;color:var(--text3);align-self:center;margin-right:2px;">Style:</span>` +
      styles.map(s =>
        `<button class="style-tab ${s === activeStyle ? 'active' : ''}" onclick="setStyle('${s}')">${s}</button>`
      ).join('');
  }

  function setStyle(s) { activeStyle = s; buildStyleFilter(); renderWithTransition(); saveState(); }

  // ── State persistence ─────────────────────────────────
  function saveState() {
    const q = document.getElementById('searchInput').value.trim();
    localStorage.setItem('nomi_gallery_nomi',   activeNomi);
    localStorage.setItem('nomi_gallery_search', q);
    localStorage.setItem('nomi_gallery_style',  activeStyle);
    localStorage.setItem('nomi_gallery_sort',   activeSort);
    const params = new URLSearchParams();
    if (activeNomi  !== 'All') params.set('nomi',  activeNomi);
    if (q)                     params.set('q',     q);
    if (activeStyle !== 'All') params.set('style', activeStyle);
    history.replaceState(null, '', window.location.pathname + (params.toString() ? '?' + params.toString() : ''));
  }

  // ── Filter + sort ─────────────────────────────────────
  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    let list = allEntries.filter(e =>
      (activeNomi  === 'All' || e.nomi  === activeNomi)  &&
      (activeStyle === 'All' || e.style === activeStyle) &&
      (!showFavsOnly || favourites[e.filename])          &&
      (!q || e.prompt.toLowerCase().includes(q) || e.nomi.toLowerCase().includes(q) || e.filename.toLowerCase().includes(q))
    );
    if (activeSort === 'oldest') list = [...list].reverse();
    // 'newest' (Last added) is default — CSV order is newest-last so no change needed
    return list;
  }

  // ── Render with fade transition ────────────────────────
  function renderWithTransition() {
    const gallery = document.getElementById('gallery');
    gallery.classList.add('fading');
    setTimeout(() => {
      render();
      gallery.classList.remove('fading');
      gallery.classList.add('visible');
    }, 150);
  }

  // ── Render ────────────────────────────────────────────
  function render() {
    const filtered = getFiltered();
    renderedCount  = 0;
    const q     = document.getElementById('searchInput').value.trim();
    const total = allEntries.filter(e => activeNomi === 'All' || e.nomi === activeNomi).length;

    document.getElementById('statsBar').textContent = q
      ? `${filtered.length} of ${total} images match "${q}"`
      : `${total} image${total !== 1 ? 's' : ''}${activeNomi !== 'All' ? ' · ' + activeNomi : ' · all Nomis'}`;

    document.getElementById('headerRight').textContent =
      `${allEntries.length} images · ${new Set(allEntries.map(e=>e.nomi)).size} Nomis`;

    const gallery = document.getElementById('gallery');
    document.getElementById('relatedStrip').classList.remove('visible');

    if (!filtered.length) {
      gallery.innerHTML = `<div class="empty-state"><p>No images match your search.</p></div>`;
      return;
    }

    // Render first page
    const firstBatch = filtered.slice(0, PAGE_SIZE);
    renderedCount = firstBatch.length;
    gallery.innerHTML = firstBatch.map((e, i) => cardHTML(e, i)).join('') +
      `<div class="scroll-sentinel" id="scrollSentinel"></div>`;

    attachSentinelObserver(filtered);
  }

  function cardHTML(e, i) {
    const src = imageUrl(e.filename);
    const isFav = !!favourites[e.filename];
    const nsfwCover = e.nsfw ? `
      <div class="nsfw-cover" id="nsfw-${i}" onclick="revealNsfw(${i}, event)">
        <span class="nsfw-label">NSFW</span>
        <span class="nsfw-hint">Click to reveal</span>
      </div>
      <span class="nsfw-badge">NSFW</span>` : '';
    return `<div class="card">
      <div class="img-area" onclick="onImgAreaClick(${i}, event)">
        <img src="${src}" alt="${e.nomi}" loading="lazy"
          id="img-${i}" class="${e.nsfw ? 'nsfw-blur' : ''}"
          onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'><svg viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.2\\' stroke-linecap=\\'round\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/><polyline points=\\'21 15 16 10 5 21\\'/></svg><span>${e.filename}</span></div>'">
        <span class="nomi-badge">${e.nomi}</span>
        ${e.style ? `<span class="style-badge">${e.style}</span>` : ''}
        ${nsfwCover}
        <button class="fav-btn-card ${isFav ? 'active' : ''}" onclick="toggleFav('${e.filename}', event)" title="${isFav ? 'Remove favourite' : 'Add to favourites'}">
          <svg viewBox="0 0 16 16" fill="${isFav ? '#fff' : 'none'}" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 13.5S1.5 9.5 1.5 5.5a3 3 0 0 1 6-1 3 3 0 0 1 6 1c0 4-6.5 8-6.5 8z"/>
          </svg>
        </button>
        <div class="prompt-overlay" onclick="event.stopPropagation()">
          <p class="prompt-overlay-text">${e.prompt}</p>
          <div class="prompt-overlay-actions">
            <span class="filename">${e.filename}</span>
            <button class="copy-btn" data-prompt="${e.prompt.replace(/"/g,'&quot;')}" onclick="copyPrompt(this)">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <rect x="5" y="5" width="9" height="9" rx="1.5"/>
                <path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1"/>
              </svg>
              Copy
            </button>
          </div>
        </div>
      </div>
    </div>`;
  }

  // ── Infinite scroll ───────────────────────────────────
  let sentinelObserver = null;

  function initInfiniteScroll() {
    sentinelObserver = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) loadMoreCards();
    }, { rootMargin: '200px' });
  }

  function attachSentinelObserver(filtered) {
    if (sentinelObserver) {
      const sentinel = document.getElementById('scrollSentinel');
      if (sentinel) sentinelObserver.observe(sentinel);
    }
    // Store filtered list for load more
    window._currentFiltered = filtered;
  }

  function loadMoreCards() {
    const filtered = window._currentFiltered || [];
    if (renderedCount >= filtered.length) return;

    const spinner = document.getElementById('loadMoreSpinner');
    spinner.classList.add('visible');

    setTimeout(() => {
      const nextBatch = filtered.slice(renderedCount, renderedCount + PAGE_SIZE);
      renderedCount += nextBatch.length;

      const sentinel = document.getElementById('scrollSentinel');
      if (sentinel) sentinel.remove();

      const gallery = document.getElementById('gallery');
      const offset  = renderedCount - nextBatch.length;
      gallery.innerHTML += nextBatch.map((e, i) => cardHTML(e, offset + i)).join('');

      if (renderedCount < filtered.length) {
        gallery.innerHTML += `<div class="scroll-sentinel" id="scrollSentinel"></div>`;
        attachSentinelObserver(filtered);
      }

      spinner.classList.remove('visible');
    }, 100);
  }

  function copyPrompt(btn) {
    const text = btn.dataset.prompt;
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2 8 6 12 14 4"/></svg> Copied!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1"/></svg> Copy prompt`;
      }, 2000);
    });
  }

  // ── Favourites ────────────────────────────────────────
  function toggleFav(filename, e) {
    if (e) e.stopPropagation();
    const isFav = !!favourites[filename];
    if (isFav) delete favourites[filename];
    else favourites[filename] = true;

    // Persist locally always
    localStorage.setItem('nomi_gallery_favs', JSON.stringify(favourites));

    // Write back to CSV via Worker if remote
    if (CONFIG.dataSource === 'remote' && CONFIG.workerUrl) {
      fetch(`${CONFIG.workerUrl}/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename, favourite: !isFav }),
      }).catch(() => {}); // silent fail — localStorage already has it
    }

    // Update allEntries in memory
    const entry = allEntries.find(e => e.filename === filename);
    if (entry) entry.favourite = !isFav;

    // Re-render card fav button without full re-render
    updateFavButtons(filename, !isFav);
    showToast(!isFav ? '♥ Added to favourites' : 'Removed from favourites');
  }

  function updateFavButtons(filename, isFav) {
    // Update all card fav buttons matching this filename
    document.querySelectorAll('.fav-btn-card').forEach(btn => {
      const card = btn.closest('.card');
      if (!card) return;
      const fn = card.querySelector('.filename')?.textContent;
      if (fn !== filename) return;
      btn.classList.toggle('active', isFav);
      btn.title = isFav ? 'Remove favourite' : 'Add to favourites';
      btn.querySelector('svg').setAttribute('fill', isFav ? '#fff' : 'none');
    });
    // Update lightbox fav button if open
    updateLbFavBtn();
    // Update sheet fav button if open
    updateSheetFavBtn();
  }

  function updateLbFavBtn() {
    const e = lbFiltered[lbIndex];
    if (!e) return;
    const isFav = !!favourites[e.filename];
    const btn = document.getElementById('lbFavBtn');
    btn.classList.toggle('fav-active', isFav);
    btn.querySelector('svg').setAttribute('fill', isFav ? 'currentColor' : 'none');
    btn.childNodes[btn.childNodes.length - 1].textContent = isFav ? ' Unfavourite' : ' Favourite';
  }

  function updateSheetFavBtn() {
    const e = lbFiltered[lbIndex];
    if (!e) return;
    const isFav = !!favourites[e.filename];
    const btn = document.getElementById('sheetFavBtn');
    btn.classList.toggle('active', isFav);
  }

  function lbToggleFav() {
    const e = lbFiltered[lbIndex];
    if (e) toggleFav(e.filename, null);
  }

  function sheetToggleFav() {
    const e = lbFiltered[lbIndex];
    if (e) toggleFav(e.filename, null);
  }

  // ── NSFW reveal ───────────────────────────────────────
  const revealedSet = new Set();

  function revealNsfw(i, e) {
    e.stopPropagation();
    revealedSet.add(i);
    const cover = document.getElementById(`nsfw-${i}`);
    const img   = document.getElementById(`img-${i}`);
    if (cover) cover.classList.add('hidden');
    if (img)   img.classList.remove('nsfw-blur');
  }

  function onImgAreaClick(i, e) {
    const cover = document.getElementById(`nsfw-${i}`);
    if (cover && !cover.classList.contains('hidden')) return;
    if (window.innerWidth <= 600) openSheet(i);
    else openLightbox(i);
  }

  // ── Lightbox ──────────────────────────────────────────
  function openLightbox(i) {
    lbFiltered = getFiltered();
    lbIndex    = i;
    showLbEntry();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
    showRelated(lbFiltered[i]);
    // Show zoom hint briefly
    const hint = document.getElementById('zoomHint');
    hint.classList.remove('hidden');
    setTimeout(() => hint.classList.add('hidden'), 3000);
  }

  function showLbEntry() {
    const e = lbFiltered[lbIndex];
    if (!e) return;
    const img = document.getElementById('lbImg');
    img.src = imageUrl(e.filename);
    img.style.transform = 'scale(1)'; // reset zoom
    currentZoom = 1;
    document.getElementById('lbNomi').textContent     = e.style ? `${e.nomi} · ${e.style}` : e.nomi;
    document.getElementById('lbPrompt').textContent   = e.prompt;
    document.getElementById('lbFilename').textContent = e.filename;
    document.getElementById('lbCounter').textContent  = `${lbIndex + 1} / ${lbFiltered.length}`;
    document.getElementById('lbPrev').disabled = lbIndex === 0;
    document.getElementById('lbNext').disabled = lbIndex === lbFiltered.length - 1;
    const copyBtn = document.getElementById('lbCopyBtn');
    copyBtn.dataset.prompt = e.prompt;
    updateLbFavBtn();
    showRelated(e);
  }

  function lbNav(dir, e) {
    if (e) e.stopPropagation();
    lbIndex = Math.max(0, Math.min(lbFiltered.length - 1, lbIndex + dir));
    showLbEntry();
    if (slideshowActive) resetSlideshowTimer();
  }

  function onLightboxBgClick(e) {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
    stopSlideshow();
    document.getElementById('relatedStrip').classList.remove('visible');
    const sr = document.getElementById('sheetRelated');
    if (sr) sr.style.display = 'none';
  }

  function lbCopy() {
    const btn = document.getElementById('lbCopyBtn');
    navigator.clipboard.writeText(btn.dataset.prompt).then(() => {
      btn.classList.add('copied');
      setTimeout(() => btn.classList.remove('copied'), 2000);
    });
  }

  // ── Pinch to zoom (desktop scroll + double-click) ─────
  let currentZoom = 1;
  const MIN_ZOOM  = 1;
  const MAX_ZOOM  = 4;

  document.getElementById('lbImgWrap').addEventListener('wheel', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.15 : 0.15;
    currentZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, currentZoom + delta));
    document.getElementById('lbImg').style.transform = `scale(${currentZoom})`;
  }, { passive: false });

  document.getElementById('lbImg').addEventListener('dblclick', () => {
    currentZoom = 1;
    document.getElementById('lbImg').style.transform = 'scale(1)';
  });

  // Pinch zoom on touch
  let pinchStartDist = 0;
  let pinchStartZoom = 1;

  document.getElementById('lbImgWrap').addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinchStartDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      pinchStartZoom = currentZoom;
    }
  }, { passive: true });

  document.getElementById('lbImgWrap').addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      currentZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, pinchStartZoom * (dist / pinchStartDist)));
      document.getElementById('lbImg').style.transform = `scale(${currentZoom})`;
    }
  }, { passive: false });

  // ── Mobile bottom sheet ───────────────────────────────
  function openSheet(i) {
    lbFiltered = getFiltered();
    lbIndex    = i;
    showSheetEntry();
    document.getElementById('sheetBackdrop').classList.add('open');
    requestAnimationFrame(() => {
      document.getElementById('bottomSheet').classList.add('open');
    });
    document.body.style.overflow = 'hidden';
    showRelated(lbFiltered[i]);
  }

  function showSheetEntry() {
    const e = lbFiltered[lbIndex];
    if (!e) return;
    document.getElementById('sheetImg').src          = imageUrl(e.filename);
    document.getElementById('sheetNomi').textContent = e.nomi;
    document.getElementById('sheetPrompt').textContent   = e.prompt;
    document.getElementById('sheetFilename').textContent = e.filename;
    document.getElementById('sheetCounter').textContent  = `${lbIndex + 1} / ${lbFiltered.length}`;
    document.getElementById('sheetPrev').disabled = lbIndex === 0;
    document.getElementById('sheetNext').disabled = lbIndex === lbFiltered.length - 1;
    const styleEl = document.getElementById('sheetStyle');
    if (e.style) { styleEl.textContent = e.style; styleEl.style.display = ''; }
    else { styleEl.style.display = 'none'; }
    document.getElementById('sheetNsfw').style.display = e.nsfw ? '' : 'none';
    const copyBtn = document.getElementById('sheetCopyBtn');
    copyBtn.textContent    = 'Copy prompt';
    copyBtn.dataset.prompt = e.prompt;
    copyBtn.classList.remove('copied');
    updateSheetFavBtn();
    document.querySelector('.sheet-body').scrollTop = 0;
    showRelated(e);
  }

  function sheetNav(dir) {
    lbIndex = Math.max(0, Math.min(lbFiltered.length - 1, lbIndex + dir));
    showSheetEntry();
  }

  function closeSheet() {
    document.getElementById('bottomSheet').classList.remove('open');
    document.getElementById('sheetBackdrop').classList.remove('open');
    document.body.style.overflow = '';
    document.getElementById('relatedStrip').classList.remove('visible');
    const sr = document.getElementById('sheetRelated');
    if (sr) sr.style.display = 'none';
  }

  function sheetCopy() {
    const btn = document.getElementById('sheetCopyBtn');
    navigator.clipboard.writeText(btn.dataset.prompt).then(() => {
      btn.textContent = 'Copied!'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy prompt'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── Related images ────────────────────────────────────
  function getKeywords(prompt) {
    return prompt.toLowerCase()
      .replace(/[^a-z0-9_\s]/g, ' ')
      .split(/[\s,]+/)
      .filter(w => w.length > 3 &&
        !['with','this','that','from','have','will','your','also','into'].includes(w));
  }

  function showRelated(entry) {
    const keywords = getKeywords(entry.prompt);
    if (!keywords.length) return;

    const scored = allEntries
      .filter(e => e.filename !== entry.filename)
      .map(e => {
        const eKeywords = getKeywords(e.prompt);
        const shared    = keywords.filter(k => eKeywords.includes(k)).length;
        return { entry: e, score: shared };
      })
      .filter(r => r.score > 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, 6);

    const strip = document.getElementById('relatedStrip');
    if (!scored.length) { strip.classList.remove('visible'); return; }

    document.getElementById('relatedTitle').textContent =
      `Related images (${scored.length} with shared keywords)`;

    document.getElementById('relatedGrid').innerHTML = scored.map(({ entry: e }) => `
      <div class="related-card" onclick="openRelated('${e.filename.replace(/'/g,"\\'")}')">
        <img src="${imageUrl(e.filename)}" alt="${e.nomi}" loading="lazy"
          onerror="this.style.display='none'">
        <span class="nomi-badge">${e.nomi}</span>
      </div>`).join('');

    strip.classList.add('visible');
  }

  function openRelated(filename) {
    const idx = lbFiltered.findIndex(e => e.filename === filename);
    if (idx === -1) return;
    if (window.innerWidth <= 600) {
      lbIndex = idx; showSheetEntry();
    } else {
      lbIndex = idx; showLbEntry();
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Slideshow ─────────────────────────────────────────
  function startSlideshow() {
    const filtered = getFiltered();
    if (!filtered.length) return;
    lbFiltered = filtered; lbIndex = 0;
    showLbEntry();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
    slideshowActive = true;
    updateSlideshowBtn();
    startSlideshowTimer();
  }

  function toggleSlideshow() {
    if (slideshowActive) stopSlideshow();
    else { slideshowActive = true; updateSlideshowBtn(); startSlideshowTimer(); }
  }

  function startSlideshowTimer() {
    const progress = document.getElementById('slideshowProgress');
    document.getElementById('slideshowBar').classList.add('visible');
    progress.style.transition = 'none'; progress.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      progress.style.transition = `width ${SLIDESHOW_INTERVAL}ms linear`;
      progress.style.width = '100%';
    }));
    slideshowTimer = setTimeout(() => {
      if (lbIndex < lbFiltered.length - 1) { lbIndex++; showLbEntry(); startSlideshowTimer(); }
      else stopSlideshow();
    }, SLIDESHOW_INTERVAL);
  }

  function resetSlideshowTimer() { clearTimeout(slideshowTimer); startSlideshowTimer(); }

  function stopSlideshow() {
    clearTimeout(slideshowTimer); slideshowTimer = null; slideshowActive = false;
    updateSlideshowBtn();
    document.getElementById('slideshowBar').classList.remove('visible');
    document.getElementById('slideshowProgress').style.width = '0%';
  }

  function updateSlideshowBtn() {
    const btn = document.getElementById('lbSlideshowBtn');
    btn.textContent = slideshowActive ? 'Stop slideshow' : 'Slideshow';
    btn.classList.toggle('slideshow-active', slideshowActive);
  }

  // ── Toast ─────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Keyboard ──────────────────────────────────────────
  document.addEventListener('keydown', e => {
    const sheetOpen = document.getElementById('bottomSheet').classList.contains('open');
    const lbOpen    = document.getElementById('lightbox').classList.contains('open');
    if (e.key === 'Escape')      { if (lbOpen) closeLightbox(); if (sheetOpen) closeSheet(); }
    if (!lbOpen && !sheetOpen) return;
    if (e.key === 'ArrowLeft')   lbOpen ? lbNav(-1, null)  : sheetNav(-1);
    if (e.key === 'ArrowRight')  lbOpen ? lbNav(1, null)   : sheetNav(1);
    if (e.key === ' ')           { e.preventDefault(); if (lbOpen) toggleSlideshow(); }
    if (e.key === 'f' || e.key === 'F') {
      const entry = lbFiltered[lbIndex];
      if (entry) toggleFav(entry.filename, null);
    }
  });

  // Swipe down to close bottom sheet
  (function() {
    let startY = 0;
    const sheet = document.getElementById('bottomSheet');
    sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
    sheet.addEventListener('touchend', e => {
      if (e.changedTouches[0].clientY - startY > 60) closeSheet();
    }, { passive: true });
  })();

  init();
</script>
</body>
</html>
